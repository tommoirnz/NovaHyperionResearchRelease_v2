<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Orbital Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #00010a;
    --panel: #080b18;
    --border: #151c35;
    --accent: #4fc3f7;
    --text: #c8d8f0;
    --dim: #3a4a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 10px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(79,195,247,0.5);
  }

  .controls {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--dim);
  }

  .ctrl-group label { color: var(--text); }

  input[type=range] {
    width: 90px;
    accent-color: var(--accent);
  }

  .val { color: var(--accent); min-width: 42px; }

  .tbtn {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.12s;
  }
  .tbtn:hover, .tbtn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,195,247,0.07);
  }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* INFO PANEL */
  .info-panel {
    width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .planet-card {
    padding: 8px 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .planet-card:hover, .planet-card.focused {
    border-color: var(--accent);
    background: rgba(79,195,247,0.04);
  }

  .planet-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }

  .planet-info { flex: 1; }
  .planet-name { font-size: 0.72rem; color: var(--text); }
  .planet-data { font-size: 0.58rem; color: var(--dim); margin-top: 2px; }

  .sec { font-size: 0.58rem; letter-spacing: 2px; color: var(--dim); margin: 8px 0 3px; text-transform: uppercase; }

  /* CANVAS */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  .canvas-wrap:active { cursor: grabbing; }

  canvas { display: block; width: 100%; height: 100%; }

  /* Focus readout */
  .readout {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(8,11,24,0.9);
    border: 1px solid var(--border);
    padding: 6px 16px;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 1px;
    pointer-events: none;
    white-space: nowrap;
  }

  .readout span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>SOLAR SYSTEM ORBITAL SIMULATOR</h1>
  <div class="controls">
    <div class="ctrl-group">
      <label>SPEED</label>
      <input type="range" id="sl-speed" min="0" max="200" value="40"
        oninput="updateSpeed(this.value)">
      <span class="val" id="v-speed">40×</span>
    </div>
    <div class="ctrl-group">
      <label>ZOOM</label>
      <input type="range" id="sl-zoom" min="20" max="400" value="100"
        oninput="updateZoom(this.value)">
      <span class="val" id="v-zoom">100%</span>
    </div>
    <button class="tbtn active" id="btn-play" onclick="togglePlay()">⏸ PAUSE</button>
    <button class="tbtn" id="btn-orbits" onclick="toggleOrbits()">ORBITS ON</button>
    <button class="tbtn" onclick="resetView()">RESET</button>
    <button class="tbtn" id="btn-labels" onclick="toggleLabels()">LABELS ON</button>
    <button class="tbtn" id="btn-kepler" onclick="toggleKepler()">KEPLER OFF</button>
  </div>
</header>

<div class="main">

  <div class="info-panel">
    <div class="sec">Planets</div>
    <div id="planet-list"></div>
    <div class="sec" style="margin-top:14px">Dwarf / Outer</div>
    <div id="dwarf-list"></div>
    <div class="sec" style="margin-top:14px">View</div>
    <button class="tbtn" onclick="setView('solar')" style="margin-bottom:3px">☀ Solar System</button>
    <button class="tbtn" onclick="setView('inner')" style="margin-bottom:3px">Inner Planets</button>
    <button class="tbtn" onclick="setView('outer')">Outer Planets</button>
  </div>

  <div class="canvas-wrap" id="wrap">
    <canvas id="c"></canvas>
    <div class="readout" id="readout">CLICK A PLANET TO FOCUS</div>
  </div>

</div>

<script>
// ─── Planet data ────────────────────────────────────────────
// a=semi-major axis AU, e=eccentricity, T=period years, i=inclination deg
// color, radius (display px), name
const PLANETS = [
  { name:'Mercury', a:0.387, e:0.206, T:0.241, i:7.0,   color:'#b0b0b0', r:3,  type:'planet',
    facts:'Ø 4,879 km | 0.24yr orbit | 430°C day'},
  { name:'Venus',   a:0.723, e:0.007, T:0.615, i:3.4,   color:'#e8c97a', r:5,  type:'planet',
    facts:'Ø 12,104 km | 0.62yr orbit | 465°C'},
  { name:'Earth',   a:1.000, e:0.017, T:1.000, i:0.0,   color:'#4fc3f7', r:5,  type:'planet',
    facts:'Ø 12,742 km | 1.00yr orbit | 1 Moon'},
  { name:'Mars',    a:1.524, e:0.093, T:1.881, i:1.85,  color:'#e07050', r:4,  type:'planet',
    facts:'Ø 6,779 km | 1.88yr orbit | 2 Moons'},
  { name:'Jupiter', a:5.203, e:0.049, T:11.86, i:1.3,   color:'#c8a870', r:12, type:'planet',
    facts:'Ø 139,820 km | 11.86yr orbit | 95 Moons'},
  { name:'Saturn',  a:9.537, e:0.057, T:29.46, i:2.49,  color:'#e8d89a', r:10, type:'planet',
    facts:'Ø 116,460 km | 29.46yr orbit | Rings'},
  { name:'Uranus',  a:19.19, e:0.046, T:84.01, i:0.77,  color:'#7de8e8', r:7,  type:'planet',
    facts:'Ø 50,724 km | 84yr orbit | Tilted 98°'},
  { name:'Neptune', a:30.07, e:0.010, T:164.8, i:1.77,  color:'#4060e8', r:7,  type:'planet',
    facts:'Ø 49,244 km | 165yr orbit | Strongest winds'},
  { name:'Pluto',   a:39.48, e:0.248, T:247.9, i:17.14, color:'#c0a090', r:2,  type:'dwarf',
    facts:'Ø 2,377 km | 248yr orbit | Dwarf planet'},
  { name:'Ceres',   a:2.770, e:0.076, T:4.607, i:10.59, color:'#909090', r:2,  type:'dwarf',
    facts:'Ø 939 km | 4.6yr orbit | Asteroid belt'},
  { name:'Eris',    a:67.66, e:0.436, T:557.0, i:44.04, color:'#d0d0d0', r:2,  type:'dwarf',
    facts:'Ø 2,326 km | 557yr orbit | Trans-Neptunian'},
  { name:'Halley',  a:17.83, e:0.967, T:75.32, i:162.3, color:'#80c0ff', r:2,  type:'dwarf',
    facts:'Comet | 75yr period | Last 1986'},
];

// ─── State ──────────────────────────────────────────────────
let playing = true;
let showOrbits = true;
let showLabels = true;
let useKepler = false; // Keplerian (elliptical) vs circular
let speedMult = 40;
let zoomScale = 1;
let panX = 0, panY = 0;
let focused = null;
let time = 0; // years
let lastTs = null;
let animId = null;

// Pan state
let dragging = false, dragStartX, dragStartY, panStartX, panStartY;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');

// ─── Build sidebar ──────────────────────────────────────────
function buildSidebar() {
  const pl = document.getElementById('planet-list');
  const dl = document.getElementById('dwarf-list');
  PLANETS.forEach((p,i) => {
    const card = document.createElement('div');
    card.className = 'planet-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="planet-dot" style="background:${p.color};color:${p.color}"></div>
      <div class="planet-info">
        <div class="planet-name">${p.name}</div>
        <div class="planet-data">${p.facts}</div>
      </div>`;
    card.onclick = () => focusPlanet(i);
    (p.type === 'dwarf' ? dl : pl).appendChild(card);
  });
}

// ─── Orbital mechanics ──────────────────────────────────────
// Mean anomaly → Eccentric anomaly (Newton-Raphson)
function solveKepler(M, e, iters=10) {
  let E = M;
  for (let i = 0; i < iters; i++) {
    E = E - (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
  }
  return E;
}

function getPosition(planet, t) {
  const M = (2 * Math.PI * t / planet.T) % (2 * Math.PI); // mean anomaly
  const E = useKepler ? solveKepler(M, planet.e) : M;
  // True anomaly from eccentric anomaly
  const cosE = Math.cos(E);
  const sinE = Math.sin(E);
  const cosV = (cosE - planet.e) / (1 - planet.e * cosE);
  const sinV = (Math.sqrt(1 - planet.e * planet.e) * sinE) / (1 - planet.e * cosE);
  // Radius in AU
  const r = planet.a * (1 - planet.e * cosE);
  // Orbital plane coordinates
  const xOrb = r * cosV;
  const yOrb = r * sinV;
  // Apply inclination (simplified: rotate around x-axis by inclination)
  const inc = planet.i * Math.PI / 180;
  const x = xOrb;
  const y = yOrb * Math.cos(inc);
  return { x, y, r };
}

// ─── Coordinate transforms ──────────────────────────────────
let AU_PX = 60; // pixels per AU at zoom=1

function toScreen(x, y) {
  const cx = canvas.width / 2 + panX;
  const cy = canvas.height / 2 + panY;
  return {
    sx: cx + x * AU_PX * zoomScale,
    sy: cy + y * AU_PX * zoomScale
  };
}

// ─── Drawing ────────────────────────────────────────────────
function drawStarfield() {
  // Cache starfield
  if (!drawStarfield._stars) {
    const stars = [];
    const rng = seeded(99);
    for (let i = 0; i < 400; i++) {
      stars.push({
        x: rng(), y: rng(),
        s: rng() * 1.5 + 0.3,
        b: rng() * 0.8 + 0.2
      });
    }
    drawStarfield._stars = stars;
  }
  drawStarfield._stars.forEach(s => {
    const twinkle = 0.7 + 0.3 * Math.sin(time * 0.5 + s.x * 100);
    ctx.globalAlpha = s.b * twinkle;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.s, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawOrbit(planet) {
  const cx = canvas.width / 2 + panX;
  const cy = canvas.height / 2 + panY;
  const inc = planet.i * Math.PI / 180;
  const a = planet.a * AU_PX * zoomScale;
  const b = a * Math.sqrt(1 - planet.e * planet.e) * Math.cos(inc);
  const foci = planet.a * planet.e * AU_PX * zoomScale; // focal offset

  ctx.save();
  ctx.strokeStyle = planet.color;
  ctx.globalAlpha = focused === null ? 0.18 : (focused === planet ? 0.5 : 0.08);
  ctx.lineWidth = focused === planet ? 1.2 : 0.6;
  if (focused === planet) {
    ctx.setLineDash([4, 4]);
  }
  ctx.beginPath();
  ctx.ellipse(cx - foci, cy, a, b, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawSun() {
  const { sx, sy } = toScreen(0, 0);
  // Glow layers
  const glows = [
    { r: 60, a: 0.03 }, { r: 40, a: 0.06 }, { r: 25, a: 0.1 },
    { r: 14, a: 0.3 }, { r: 10, a: 0.7 }
  ];
  glows.forEach(g => {
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, g.r);
    grad.addColorStop(0, `rgba(255,220,100,${g.a})`);
    grad.addColorStop(1, 'rgba(255,140,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, g.r, 0, Math.PI * 2);
    ctx.fill();
  });
  // Sun body
  const sg = ctx.createRadialGradient(sx-3, sy-3, 0, sx, sy, 10);
  sg.addColorStop(0, '#fff8e1');
  sg.addColorStop(0.4, '#ffeb3b');
  sg.addColorStop(1, '#ff8f00');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.arc(sx, sy, 10, 0, Math.PI * 2);
  ctx.fill();
  if (showLabels) {
    ctx.fillStyle = '#ffeb3b';
    ctx.font = '10px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText('☀ SUN', sx, sy + 22);
  }
}

function drawSaturnRings(sx, sy, r) {
  ctx.save();
  ctx.strokeStyle = '#d4b483';
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(sx, sy, r * 2.2, r * 0.6, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.ellipse(sx, sy, r * 2.6, r * 0.72, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawPlanet(planet, pos) {
  const { sx, sy } = toScreen(pos.x, pos.y);
  const r = planet.r * (zoomScale > 1.5 ? 1.2 : 1);
  const isFocused = focused === planet;

  // Focus halo
  if (isFocused) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(sx, sy, r + 8, 0, Math.PI * 2);
    ctx.strokeStyle = planet.color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4;
    ctx.stroke();
    ctx.restore();
  }

  // Saturn rings behind
  if (planet.name === 'Saturn') drawSaturnRings(sx, sy, r);

  // Planet glow
  const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 2.5);
  glow.addColorStop(0, planet.color + 'aa');
  glow.addColorStop(1, planet.color + '00');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Planet body
  const grad = ctx.createRadialGradient(sx - r*0.3, sy - r*0.3, 0, sx, sy, r);
  grad.addColorStop(0, lighten(planet.color));
  grad.addColorStop(1, darken(planet.color));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.fill();

  // Label
  if (showLabels) {
    ctx.fillStyle = planet.color;
    ctx.font = `${isFocused ? 11 : 9}px Share Tech Mono`;
    ctx.textAlign = 'center';
    ctx.fillText(planet.name, sx, sy - r - 5);
    if (isFocused) {
      ctx.fillStyle = '#8090b0';
      ctx.font = '8px Share Tech Mono';
      ctx.fillText(planet.facts, sx, sy - r - 17);
    }
  }
}

function drawOrbitalLine(planet, pos) {
  // Draw a small velocity vector for focused planet
  if (focused !== planet) return;
  const dt = 0.001;
  const pos2 = getPosition(planet, time + dt);
  const { sx: x1, sy: y1 } = toScreen(pos.x, pos.y);
  const { sx: x2, sy: y2 } = toScreen(pos2.x, pos2.y);
  const len = 30;
  const dx = x2 - x1, dy = y2 - y1;
  const mag = Math.hypot(dx, dy) || 1;
  ctx.strokeStyle = planet.color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 + dx/mag * len, y1 + dy/mag * len);
  // Arrow
  const ax = x1 + dx/mag * len, ay = y1 + dy/mag * len;
  const ang = Math.atan2(dy, dx);
  ctx.lineTo(ax - 7*Math.cos(ang-0.4), ay - 7*Math.sin(ang-0.4));
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - 7*Math.cos(ang+0.4), ay - 7*Math.sin(ang+0.4));
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawAsteroidBelt() {
  const rng = seeded(1234);
  ctx.save();
  const cx = canvas.width / 2 + panX;
  const cy = canvas.height / 2 + panY;
  for (let i = 0; i < 300; i++) {
    const a = (2.2 + rng() * 1.2) * AU_PX * zoomScale;
    const angle = rng() * Math.PI * 2 + time * 0.005;
    const x = cx + a * Math.cos(angle);
    const y = cy + a * Math.sin(angle) * 0.92;
    ctx.fillStyle = '#504030';
    ctx.globalAlpha = rng() * 0.5 + 0.15;
    ctx.beginPath();
    ctx.arc(x, y, rng() * 1.2 + 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawDate() {
  const year = 2000 + time;
  const yr = Math.floor(year);
  const dayOfYear = Math.floor((year - yr) * 365.25);
  ctx.fillStyle = '#3a4a6a';
  ctx.font = '10px Share Tech Mono';
  ctx.textAlign = 'right';
  ctx.fillText(`SIM DATE: ${yr} DOY:${String(dayOfYear).padStart(3,'0')}`, canvas.width - 12, canvas.height - 12);
}

function drawFocalPoints() {
  if (!focused || !useKepler) return;
  const planet = focused;
  const cx = canvas.width / 2 + panX;
  const cy = canvas.height / 2 + panY;
  const foci = planet.a * planet.e * AU_PX * zoomScale;
  // Draw second focus
  ctx.fillStyle = '#4a5a8a';
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(cx - 2*foci, cy, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#8090b0';
  ctx.font = '8px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('empty focus', cx - 2*foci, cy + 12);
  ctx.globalAlpha = 1;
}

// ─── Main render loop ────────────────────────────────────────
function render(ts) {
  animId = requestAnimationFrame(render);

  // Resize
  const W = wrap.clientWidth, H = wrap.clientHeight;
  if (canvas.width !== W || canvas.height !== H) {
    canvas.width = W; canvas.height = H;
  }

  // Advance time
  if (playing && lastTs !== null) {
    const dt = (ts - lastTs) / 1000; // seconds
    time += dt * speedMult / 365.25; // years
  }
  lastTs = ts;

  // Clear
  ctx.fillStyle = '#00010a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Starfield
  drawStarfield();

  // Asteroid belt
  drawAsteroidBelt();

  // Compute positions
  const positions = PLANETS.map(p => getPosition(p, time));

  // Orbits
  if (showOrbits) {
    PLANETS.forEach(p => drawOrbit(p));
  }

  // Focal points (Kepler mode)
  drawFocalPoints();

  // Sun
  drawSun();

  // Planets
  PLANETS.forEach((p, i) => {
    drawOrbitalLine(p, positions[i]);
    drawPlanet(p, positions[i]);
  });

  // Date overlay
  drawDate();

  // Update readout
  if (focused) {
    const pos = positions[PLANETS.indexOf(focused)];
    const dist = Math.hypot(pos.x, pos.y);
    document.getElementById('readout').innerHTML =
      `<span>${focused.name.toUpperCase()}</span> | Distance: <span>${dist.toFixed(3)} AU</span> | Period: <span>${focused.T} yr</span> | Eccentricity: <span>${focused.e}</span>`;
  }
}

// ─── Interaction ─────────────────────────────────────────────
function togglePlay() {
  playing = !playing;
  lastTs = null;
  document.getElementById('btn-play').textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
  document.getElementById('btn-play').classList.toggle('active', playing);
}

function toggleOrbits() {
  showOrbits = !showOrbits;
  const b = document.getElementById('btn-orbits');
  b.textContent = showOrbits ? 'ORBITS ON' : 'ORBITS OFF';
  b.classList.toggle('active', showOrbits);
}

function toggleLabels() {
  showLabels = !showLabels;
  const b = document.getElementById('btn-labels');
  b.textContent = showLabels ? 'LABELS ON' : 'LABELS OFF';
  b.classList.toggle('active', showLabels);
}

function toggleKepler() {
  useKepler = !useKepler;
  const b = document.getElementById('btn-kepler');
  b.textContent = useKepler ? 'KEPLER ON' : 'KEPLER OFF';
  b.classList.toggle('active', useKepler);
}

function updateSpeed(v) {
  speedMult = parseFloat(v);
  document.getElementById('v-speed').textContent = v + '×';
}

function updateZoom(v) {
  zoomScale = v / 100;
  document.getElementById('v-zoom').textContent = v + '%';
}

function focusPlanet(i) {
  focused = focused === PLANETS[i] ? null : PLANETS[i];
  document.querySelectorAll('.planet-card').forEach((c,j) => {
    c.classList.toggle('focused', j === i && focused !== null);
  });
  if (!focused) {
    document.getElementById('readout').innerHTML = 'CLICK A PLANET TO FOCUS';
  }
}

function setView(mode) {
  panX = 0; panY = 0;
  if (mode === 'solar') { zoomScale = 0.6; document.getElementById('sl-zoom').value = 60; document.getElementById('v-zoom').textContent = '60%'; }
  if (mode === 'inner') { zoomScale = 3.0; document.getElementById('sl-zoom').value = 300; document.getElementById('v-zoom').textContent = '300%'; }
  if (mode === 'outer') { zoomScale = 0.35; document.getElementById('sl-zoom').value = 35; document.getElementById('v-zoom').textContent = '35%'; }
}

function resetView() {
  panX = 0; panY = 0; zoomScale = 1; focused = null;
  document.getElementById('sl-zoom').value = 100;
  document.getElementById('v-zoom').textContent = '100%';
  document.querySelectorAll('.planet-card').forEach(c => c.classList.remove('focused'));
  document.getElementById('readout').innerHTML = 'CLICK A PLANET TO FOCUS';
}

// Pan
wrap.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
});
wrap.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX = panStartX + e.clientX - dragStartX;
  panY = panStartY + e.clientY - dragStartY;
});
wrap.addEventListener('mouseup', () => dragging = false);
wrap.addEventListener('mouseleave', () => dragging = false);

// Scroll zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  zoomScale = Math.max(0.1, Math.min(5, zoomScale + delta));
  const pct = Math.round(zoomScale * 100);
  document.getElementById('sl-zoom').value = Math.min(400, pct);
  document.getElementById('v-zoom').textContent = pct + '%';
}, { passive: false });

// Click to focus
wrap.addEventListener('click', e => {
  if (Math.abs(e.clientX - dragStartX) > 5) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const positions = PLANETS.map(p => getPosition(p, time));
  let closest = null, minDist = 20;
  PLANETS.forEach((p, i) => {
    const { sx, sy } = toScreen(positions[i].x, positions[i].y);
    const d = Math.hypot(mx - sx, my - sy);
    if (d < minDist) { minDist = d; closest = i; }
  });
  if (closest !== null) focusPlanet(closest);
  else { focused = null; document.querySelectorAll('.planet-card').forEach(c=>c.classList.remove('focused')); document.getElementById('readout').innerHTML = 'CLICK A PLANET TO FOCUS'; }
});

// ─── Colour helpers ─────────────────────────────────────────
function lighten(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}
function darken(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
}
function seeded(s){ let x=s; return ()=>{ x=(x*1664525+1013904223)>>>0; return x/0xffffffff; }; }

// ─── Boot ────────────────────────────────────────────────────
buildSidebar();
setView('solar');
requestAnimationFrame(render);
</script>
